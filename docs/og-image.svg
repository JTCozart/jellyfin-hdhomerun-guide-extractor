<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0e13"/>
      <stop offset="1" stop-color="#16202e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00a4dc"/>
      <stop offset="1" stop-color="#52b54b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <g transform="translate(80,90)">
    <rect width="64" height="64" rx="16" fill="url(#accent)"/>
    <g fill="#fff">
      <circle cx="32" cy="26" r="9"/>
      <path d="M20 46c0-8 5.4-13 12-13s12 5 12 13" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    </g>
    <text x="84" y="44" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" fill="#9aa6b6">Jellyfin plugin</text>
  </g>

  <text x="80" y="270" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#e7ecf3">HDHomeRun EPG</text>
  <text x="80" y="330" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="34" fill="#9aa6b6">Auto-refreshing XMLTV guide, pre-mapped to your tuner</text>

  <!-- schematic: device -> cloud -> xmltv -->
  <g transform="translate(80,420)" font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="#161b24" stroke="rgba(255,255,255,.12)"/>
    <text x="110" y="42" font-size="22" fill="#e7ecf3" text-anchor="middle">HDHomeRun</text>

    <path d="M230,35 L330,35" stroke="#00a4dc" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="340" y="0" width="220" height="70" rx="10" fill="#161b24" stroke="rgba(255,255,255,.12)"/>
    <text x="450" y="42" font-size="22" fill="#e7ecf3" text-anchor="middle">SiliconDust API</text>

    <path d="M570,35 L670,35" stroke="#00a4dc" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="680" y="0" width="220" height="70" rx="10" fill="#161b24" stroke="rgba(255,255,255,.12)"/>
    <text x="790" y="42" font-size="22" fill="#e7ecf3" text-anchor="middle">XMLTV file</text>

    <path d="M910,35 L1010,35" stroke="#52b54b" stroke-width="4" marker-end="url(#arrowg)"/>

    <rect x="1020" y="0" width="220" height="70" rx="10" fill="#161b24" stroke="rgba(255,255,255,.12)"/>
    <text x="1130" y="42" font-size="22" fill="#e7ecf3" text-anchor="middle">Jellyfin Guide</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#00a4dc"/>
    </marker>
    <marker id="arrowg" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#52b54b"/>
    </marker>
  </defs>

  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>
