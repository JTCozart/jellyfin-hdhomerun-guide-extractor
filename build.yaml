name: "HDHomeRun EPG"
guid: "561f5530-ec1f-4bb0-9dd4-1efbff63ed87"
version: "1.0.0.0"
targetAbi: "10.11.0.0"
framework: "net9.0"
overview: "Auto-refreshing XMLTV guide generated from a HDHomeRun device's own EPG."
description: >
  HDHomeRun EPG polls a HDHomeRun device's EPG (via SiliconDust's cloud XMLTV API) on a
  schedule, remaps the channel ids to match the device's tuner lineup, and writes the result
  as an XMLTV file. Point Jellyfin's built-in XMLTV guide provider at the generated file (path
  or URL, shown on the plugin's page) once, and the guide stays current automatically with no
  channel mapping and no external scripts or cron jobs required.
category: "Live TV"
owner: "jtczrt"
artifacts:
  - "Jellyfin.Plugin.HdhrEpg.dll"
changelog: >
  ### Initial release
  - Auto-discovers the HDHomeRun device and generates an XMLTV guide with channel ids
    pre-mapped to the tuner lineup
  - Scheduled background refresh with a configurable interval
  - Config page with live status, one-click refresh, and a copyable path/URL for Jellyfin's
    built-in XMLTV guide provider
